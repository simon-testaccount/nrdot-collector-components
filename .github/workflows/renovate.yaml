name: 🔄 Renovate
on:
  schedule:
    - cron: "0 */4 * * 1-5" # every 4 hours on weekdays
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (log only, no PRs created)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Renovate
        uses: renovatebot/github-action@3633cede7d4d4598438e654eac4a695e46004420 # v46.1.7
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RELEASE_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.dry_run && 'debug' || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dry_run && 'full' || '' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_GIT_AUTHOR: "github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
